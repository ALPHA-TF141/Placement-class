<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration - ABC College</title>

    <!-- External CSS (reuse same file) -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS for this page -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0378f6;
            margin: 0;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            background: #f10606;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #003366;
            margin-bottom: 20px;
        }

        form label {
            display: block;
            margin: 10px 0 5px;
            font-weight: bold;
        }

        form input[type="text"],
        form input[type="email"],
        form input[type="date"],
        form select {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .row .col {
            flex: 1;
        }

        .btn-group {
            text-align: center;
            margin-top: 20px;
        }

        .btn {
            background: #003366;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 0 10px;
            cursor: pointer;
            border-radius: 4px;
        }

        .btn:hover {
            background: #0059b3;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Inline CSS example -->
        <h2 style="text-transform: uppercase;">Student Registration Form</h2>

        <form action="#" method="post">
            <div class="row">
                <div class="col">
                    <label for="fname">First Name</label>
                    <input type="text" id="fname" name="fname" required>
                </div>
                <div class="col">
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname" name="lname" required>
                </div>
            </div>

            <label for="email">Email ID</label>
            <input type="email" id="email" name="email" required>

            <div class="row">
                <div class="col">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob" required>
                </div>
                <div class="col">
                    <label for="phone">Mobile Number</label>
                    <input type="text" id="phone" name="phone" required>
                </div>
            </div>

            <label for="course">Course Applying For</label>
            <select id="course" name="course" required>
                <option value="">-- Select Course --</option>
                <option value="CSE">B.Tech Computer Science</option>
                <option value="ECE">B.Tech Electronics</option>
                <option value="MECH">B.Tech Mechanical</option>
                <option value="MBA">MBA</option>
            </select>

            <label>Gender</label>
            <input type="radio" id="male" name="gender" value="Male">
            <label for="male" style="display:inline;">Male</label>
            <input type="radio" id="female" name="gender" value="Female">
            <label for="female" style="display:inline;">Female</label>

            <label for="address">Address</label>
            <input type="text" id="address" name="address">

            <div class="btn-group">
                <button type="submit" class="btn">Submit</button>
                <button type="reset" class="btn" style="background:#f40404;">Reset</button>
            </div>
        </form>

        <a href="index.html" class="back-link">← Back to College Home</a>
    </div>
</body>
</html>
