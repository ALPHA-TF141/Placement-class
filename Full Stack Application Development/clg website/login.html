<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vel Tech University Login</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        form {
            background-color: #0675f3;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        label, input {
            margin-bottom: 10px;
            display: block;
        }

        input[type="submit"] {
            background-color: #f80505;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Login to College Website</h1>

<form action="/login" method="post">
    <label for="username">Username:</label>
    <input type="text" id="username" name="username" required onkeyup="checkLogin()">

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required onkeyup="checkLogin()">

    <button type="submit">Login</button>
</form>

<h3>Sign Up Here:</h3>
<form action="/register" method="post">
    <label for="new_username">New Username:</label>
    <input type="text" id="new_username" name="new_username" required onkeyup="checkSignup()">

    <label for="new_password">New Password:</label>
    <input type="password" id="new_password" name="new_password" required onkeyup="checkSignup()">

    <button type="submit">Sign Up</button>
</form>

<script>
function checkLogin() {
    var username = document.getElementById("username").value;
    var password = document.getElementById("password").value;

    // Simulate validation
    if (username.length < 3) {
        alert("Username must be at least 3 characters long");
        return false;
    }
    if (!/^[A-Za-z0-9]+$/.test(username)) {
        alert("Username can only contain letters and numbers");
        return false;
    }
    if (password.length < 6) {
        alert("Password must be at least 6 characters long");
        return false;
    }

    // If all checks pass, redirect to college website
    window.location.href = "/index.html";
}

function checkSignup() {
    var username = document.getElementById("new_username").value;
    var password = document.getElementById("new_password").value;

    // Simulate validation
    if (username.length < 3) {
        alert("Username must be at least 3 characters long");
        return false;
    }
    if (!/^[A-Za-z0-9]+$/.test(username)) {
        alert("Username can only contain letters and numbers");
        return false;
    }
    if (password.length < 6) {
        alert("Password must be at least 6 characters long");
        return false;
    }

    // If all checks pass, redirect to college website
    window.location.href = "/index.html";
}

</script>

</body>
</html>
